<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="5마틴" />
  <meta name="theme-color" content="#f2f3f5" />
  <title>5마틴 계산기</title>
  <style>
    :root {
      --bg: #f2f3f5;
      --card: #ffffff;
      --text: #171717;
      --sub: #666;
      --blue: #1677ff;
      --red: #e53935;
      --green: #1b9a4b;
      --black: #111;
      --yellow: #fff5cc;
      --soft-blue: #eef6ff;
      --shadow: 0 6px 18px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; width: 100%; min-height: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      overscroll-behavior: none;
    }
    body { padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom); }
    .app {
      width: 100%; max-width: 430px; margin: 0 auto; min-height: 100dvh;
      display: flex; flex-direction: column; gap: 7px; padding: 8px 0;
    }
    .title { text-align: center; font-size: 17px; font-weight: 800; line-height: 1.15; margin: 0; }
    .tabs {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
      background: #e3e5e8; padding: 4px; border-radius: 12px;
    }
    .tab {
      border: 0; border-radius: 9px; padding: 8px 4px; font-weight: 800;
      font-size: 14px; color: #555; background: transparent;
    }
    .tab.active { background: #fff; color: #111; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card { background: var(--card); border-radius: 14px; padding: 10px; box-shadow: var(--shadow); }
    .card.soft { background: var(--soft-blue); }
    .card.yellow { background: var(--yellow); }
    .card-title { text-align: center; color: var(--sub); font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .profit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: start; }
    .metric { text-align: center; min-width: 0; }
    .label { font-size: 11px; color: var(--sub); margin-bottom: 2px; }
    .value {
      font-size: 19px; font-weight: 900; letter-spacing: -0.5px;
      line-height: 1.1; word-break: keep-all; white-space: nowrap;
    }
    .blue { color: var(--blue); }
    .red { color: var(--red); }
    .green { color: var(--green); }
    .loss-inline {
      display: inline-block; color: var(--red); font-size: 12px; font-weight: 900;
      margin-left: 2px; vertical-align: baseline;
    }
    .small-line { text-align: center; font-size: 11px; color: var(--sub); margin-top: 5px; line-height: 1.25; }
    .system-row { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .round { font-size: 29px; font-weight: 950; letter-spacing: -0.8px; line-height: 1; }
    .right-info { text-align: right; font-size: 12px; line-height: 1.35; color: var(--sub); }
    .right-info strong { display: block; color: var(--text); font-size: 14px; }
    .input-row { display: grid; grid-template-columns: 1fr 86px; gap: 8px; }
    input {
      width: 100%; border: 1px solid #d5d7db; border-radius: 12px;
      padding: 11px 12px; font-size: 17px; outline: none; background: #fff;
    }
    input:focus { border-color: var(--blue); }
    button { cursor: pointer; user-select: none; touch-action: manipulation; }
    .save-btn {
      border: 0; border-radius: 12px; background: var(--black); color: #fff;
      font-size: 15px; font-weight: 900;
    }
    .stake-card { text-align: center; }
    .stake { font-size: 31px; font-weight: 950; letter-spacing: -1px; line-height: 1; margin: 4px 0; }
    .hint { font-size: 11px; color: var(--sub); line-height: 1.25; }
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .action {
      border: 0; color: #fff; border-radius: 13px; padding: 12px 8px;
      font-size: 17px; font-weight: 950;
    }
    .hit { background: var(--blue); }
    .miss { background: var(--red); }
    .message {
      min-height: 42px; max-height: 54px; overflow: hidden; text-align: center;
      font-size: 11px; color: var(--sub); line-height: 1.35; white-space: pre-line; padding: 2px 8px;
    }
    .reset-row { display: flex; justify-content: center; gap: 18px; padding: 0 0 4px; margin-top: auto; }
    .link-btn { border: 0; background: transparent; color: var(--red); font-size: 12px; font-weight: 800; padding: 6px 4px; }
    .danger { font-weight: 950; }
    @media (max-height: 710px) {
      .app { gap: 5px; padding-top: 5px; }
      .card { padding: 8px; border-radius: 12px; }
      .title { font-size: 16px; }
      .tab { padding: 7px 4px; }
      .value { font-size: 17px; }
      .round { font-size: 26px; }
      .stake { font-size: 28px; }
      .action { padding: 10px 8px; }
      input { padding: 9px 10px; }
      .message { min-height: 36px; max-height: 44px; }
    }
    @media (max-width: 340px) {
      body { padding-left: 6px; padding-right: 6px; }
      .value { font-size: 15px; }
      .loss-inline { display: block; margin-left: 0; margin-top: 2px; }
      .stake { font-size: 25px; }
      .round { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">5마틴 계산기</h1>

    <section class="tabs" aria-label="운영 선택">
      <button class="tab active" id="tab1" type="button">1번 운영</button>
      <button class="tab" id="tab2" type="button">2번 운영</button>
    </section>

    <section class="card">
      <div class="card-title">통합 수익</div>
      <div class="profit-row">
        <div class="metric">
          <div class="label">누적수익</div>
          <div class="value blue" id="totalAccumulatedProfit">0원</div>
        </div>
        <div class="metric">
          <div class="label">원금수익</div>
          <div class="value" id="principalProfitWrap">
            <span id="totalPrincipalProfit">0원</span>
            <span class="loss-inline" id="totalPendingLoss"></span>
          </div>
        </div>
      </div>
      <div class="small-line" id="splitLoss">1번 -0원 / 2번 -0원</div>
    </section>

    <section class="card soft">
      <div class="system-row">
        <div>
          <div class="label" id="systemLabel">1번 운영</div>
          <div class="round" id="currentRound">1회차</div>
        </div>
        <div class="right-info">
          <strong id="savedOdds">배당 3.7</strong>
          <span id="cycleLoss">사이클 손실 0원</span>
        </div>
      </div>
    </section>

    <section class="input-row">
      <input id="oddsInput" inputmode="decimal" placeholder="배당 입력" autocomplete="off" />
      <button class="save-btn" id="saveBtn" type="button">저장</button>
    </section>

    <section class="card yellow stake-card">
      <div class="label">이번 회차 베팅금</div>
      <div class="stake" id="stake">0원</div>
      <div class="hint">적중 시 손실복구 후 회차×20,000원 누적 / 초과분 원금수익</div>
    </section>

    <section class="action-row">
      <button class="action hit" id="hitBtn" type="button">적중</button>
      <button class="action miss" id="missBtn" type="button">미적중</button>
    </section>

    <section class="message" id="message">배당 입력 후 저장</section>

    <section class="reset-row">
      <button class="link-btn" id="resetCurrentBtn" type="button">1번 초기화</button>
      <button class="link-btn danger" id="resetAllBtn" type="button">전체 초기화</button>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "martin_webapp_state_v1";

    const DEFAULT_STATE = {
      selectedSystem: 1,
      totalAccumulatedProfit: 0,
      totalPrincipalProfit: 0,
      systems: {
        1: { currentRound: 1, savedOdds: 3.7, currentCycleLoss: 0, pendingPrincipalLoss: 0 },
        2: { currentRound: 1, savedOdds: 3.7, currentCycleLoss: 0, pendingPrincipalLoss: 0 }
      }
    };

    const TARGET_PROFIT_PER_ROUND = 20000;
    const MAX_ROUND = 5;

    let state = loadState();

    const $ = (id) => document.getElementById(id);

    const els = {
      tab1: $("tab1"),
      tab2: $("tab2"),
      totalAccumulatedProfit: $("totalAccumulatedProfit"),
      totalPrincipalProfit: $("totalPrincipalProfit"),
      totalPendingLoss: $("totalPendingLoss"),
      splitLoss: $("splitLoss"),
      systemLabel: $("systemLabel"),
      currentRound: $("currentRound"),
      savedOdds: $("savedOdds"),
      cycleLoss: $("cycleLoss"),
      oddsInput: $("oddsInput"),
      saveBtn: $("saveBtn"),
      stake: $("stake"),
      hitBtn: $("hitBtn"),
      missBtn: $("missBtn"),
      message: $("message"),
      resetCurrentBtn: $("resetCurrentBtn"),
      resetAllBtn: $("resetAllBtn")
    };

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return clone(DEFAULT_STATE);
        const parsed = JSON.parse(raw);
        return {
          ...clone(DEFAULT_STATE),
          ...parsed,
          systems: {
            1: { ...DEFAULT_STATE.systems[1], ...(parsed.systems?.[1] || {}) },
            2: { ...DEFAULT_STATE.systems[2], ...(parsed.systems?.[2] || {}) }
          }
        };
      } catch {
        return clone(DEFAULT_STATE);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function currentSystem() {
      return state.systems[state.selectedSystem];
    }

    function money(value) {
      const rounded = Math.round(Number(value) || 0);
      return rounded.toLocaleString("ko-KR") + "원";
    }

    function decimal(value) {
      const num = Number(value) || 0;
      return num.toLocaleString("ko-KR", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function stakeForSystem(system) {
      const odds = Number(system.savedOdds);
      if (!Number.isFinite(odds) || odds <= 1) return 0;

      const targetProfitForCurrentRound = TARGET_PROFIT_PER_ROUND * system.currentRound;
      const rawStake = (system.currentCycleLoss + targetProfitForCurrentRound) / (odds - 1);
      return Math.ceil(rawStake / 1000) * 1000;
    }

    function totalPendingLoss() {
      return state.systems[1].pendingPrincipalLoss + state.systems[2].pendingPrincipalLoss;
    }

    function setMessage(text) {
      els.message.textContent = text;
    }

    function render() {
      const s = currentSystem();
      const pendingTotal = totalPendingLoss();

      els.tab1.classList.toggle("active", state.selectedSystem === 1);
      els.tab2.classList.toggle("active", state.selectedSystem === 2);

      els.totalAccumulatedProfit.textContent = money(state.totalAccumulatedProfit);
      els.totalPrincipalProfit.textContent = money(state.totalPrincipalProfit);
      els.totalPrincipalProfit.className = state.totalPrincipalProfit >= 0 ? "green" : "red";

      els.totalPendingLoss.textContent = pendingTotal > 0 ? "(-" + money(pendingTotal) + ")" : "";
      els.splitLoss.textContent =
        "1번 -" + money(state.systems[1].pendingPrincipalLoss) +
        " / 2번 -" + money(state.systems[2].pendingPrincipalLoss);

      els.systemLabel.textContent = state.selectedSystem + "번 운영";
      els.currentRound.textContent = s.currentRound + "회차";
      els.savedOdds.textContent = "배당 " + decimal(s.savedOdds);
      els.cycleLoss.textContent = "사이클 손실 " + money(s.currentCycleLoss);
      els.stake.textContent = money(stakeForSystem(s));

      els.resetCurrentBtn.textContent = state.selectedSystem + "번 초기화";
      els.oddsInput.value = decimal(s.savedOdds);

      saveState();
    }

    function selectSystem(num) {
      state.selectedSystem = num;
      const s = currentSystem();
      setMessage(num + "번 운영 시작 / " + s.currentRound + "회차");
      render();
    }

    function saveOdds() {
      const cleaned = els.oddsInput.value.trim().replace(",", ".");
      const odds = Number(cleaned);

      if (!Number.isFinite(odds) || odds <= 1) {
        setMessage("배당은 1보다 큰 숫자로 입력");
        return;
      }

      const s = currentSystem();
      s.savedOdds = odds;
      setMessage(state.selectedSystem + "번 배당 " + decimal(s.savedOdds) + " 저장 / 베팅금 " + money(stakeForSystem(s)));
      render();
    }

    function hit() {
      const s = currentSystem();
      const stake = stakeForSystem(s);

      if (stake <= 0 || s.savedOdds <= 1) {
        setMessage("먼저 배당 저장");
        return;
      }

      const hitRound = s.currentRound;
      const rawProfit = stake * (s.savedOdds - 1);
      const recoveredLoss = s.currentCycleLoss;
      const netProfit = rawProfit - recoveredLoss;

      const accumulatedPart = TARGET_PROFIT_PER_ROUND * hitRound;
      const principalPart = Math.max(0, netProfit - accumulatedPart);

      state.totalAccumulatedProfit += accumulatedPart;
      state.totalPrincipalProfit += principalPart;

      const clearedLoss = s.pendingPrincipalLoss;

      s.currentRound = 1;
      s.currentCycleLoss = 0;
      s.pendingPrincipalLoss = 0;

      setMessage(
        state.selectedSystem + "번 " + hitRound + "회차 적중\n" +
        "적중수익 " + money(rawProfit) + " / 손실복구 " + money(recoveredLoss) + "\n" +
        "누적 +" + money(accumulatedPart) + " / 원금 +" + money(principalPart) + "\n" +
        "손실괄호 " + money(clearedLoss) + " 초기화"
      );

      render();
    }

    function miss() {
      const s = currentSystem();
      const stake = stakeForSystem(s);

      if (stake <= 0 || s.savedOdds <= 1) {
        setMessage("먼저 배당 저장");
        return;
      }

      const missedRound = s.currentRound;

      s.currentCycleLoss += stake;
      s.pendingPrincipalLoss += stake;

      if (s.currentRound >= MAX_ROUND) {
        const confirmedLoss = s.pendingPrincipalLoss;

        state.totalPrincipalProfit -= confirmedLoss;

        s.currentRound = 1;
        s.currentCycleLoss = 0;
        s.pendingPrincipalLoss = 0;

        setMessage(
          state.selectedSystem + "번 5회차 미적중\n" +
          "누적수익 차감 없음\n" +
          "원금수익 -" + money(confirmedLoss) + " 확정 / 1회차 리셋"
        );
      } else {
        s.currentRound += 1;
        setMessage(
          state.selectedSystem + "번 " + missedRound + "회차 미적중\n" +
          "손실 " + money(stake) + " 괄호 반영\n" +
          s.currentRound + "회차 이동"
        );
      }

      render();
    }

    function resetCurrentSystem() {
      const s = currentSystem();

      s.currentRound = 1;
      s.savedOdds = 3.7;
      s.currentCycleLoss = 0;
      s.pendingPrincipalLoss = 0;

      setMessage(state.selectedSystem + "번 운영만 초기화 / 통합 수익 유지");
      render();
    }

    function resetAll() {
      const ok = confirm("전체 초기화할까요? 통합 수익까지 전부 0으로 돌아갑니다.");
      if (!ok) return;

      state = clone(DEFAULT_STATE);
      setMessage("전체 초기화 완료");
      render();
    }

    els.tab1.addEventListener("click", () => selectSystem(1));
    els.tab2.addEventListener("click", () => selectSystem(2));
    els.saveBtn.addEventListener("click", saveOdds);
    els.hitBtn.addEventListener("click", hit);
    els.missBtn.addEventListener("click", miss);
    els.resetCurrentBtn.addEventListener("click", resetCurrentSystem);
    els.resetAllBtn.addEventListener("click", resetAll);

    els.oddsInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        saveOdds();
        els.oddsInput.blur();
      }
    });

    render();
    setMessage(state.selectedSystem + "번 운영 시작 / " + currentSystem().currentRound + "회차");
  </script>
</body>
</html>
